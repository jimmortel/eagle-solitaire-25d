<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Eagle Solitaire 2.5D</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* FORCE LA SUPPRESSION DE LA BARRE VERCEL PAR LE CSS */
        #vercel-toolbar, .vercel-toolbar, [data-vercel-toolbar] { 
            display: none !important; 
            pointer-events: none !important; 
            visibility: hidden !important; 
        }
        
        body { background: radial-gradient(circle at center, #1a472a 0%, #0d2415 100%); height: 100vh; overflow: hidden; color: white; margin: 0; touch-action: manipulation; }
        .card { 
            width: 55px; height: 80px; background: white; border-radius: 8px; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.5); position: absolute;
            display: flex; align-items: center; justify-content: center;
            font-weight: bold; font-size: 1.1rem; color: #111;
            z-index: 50; transition: transform 0.2s;
        }
        .card.red { color: #e11d48; }
        .slot { width: 55px; height: 80px; border: 1px dashed rgba(255,255,255,0.2); border-radius: 8px; }
        #game-board { position: relative; width: 100%; height: 50vh; z-index: 40; }
    </style>
</head>
<body class="p-4">
    <div class="flex justify-between items-center mb-8">
        <button onclick="window.location.href='https://eagle-tetris.vercel.app'" class="bg-black/60 px-4 py-2 rounded-xl text-[10px] border border-white/20 uppercase font-bold z-[100]">⬅ Hub Arcade</button>
        <div class="text-[10px] font-bold text-blue-400 px-2 py-1 rounded bg-blue-900/30 border border-blue-500/40">$TALONS SYNC</div>
    </div>

    <div id="game-board">
        <div class="flex justify-center gap-2 mb-8">
            <div class="slot"></div><div class="slot"></div><div class="slot"></div><div class="slot"></div>
        </div>
        <div class="card" style="top: 100px; left: 15%; transform: rotate(-5deg);" onclick="this.style.transform='translateY(-20px) rotate(0deg)'">A♠</div>
        <div class="card red" style="top: 110px; left: 42%; transform: rotate(2deg);" onclick="this.style.transform='translateY(-20px) rotate(0deg)'">K♥</div>
        <div class="card" style="top: 105px; left: 70%; transform: rotate(-2deg);" onclick="this.style.transform='translateY(-20px) rotate(0deg)'">Q♣</div>
    </div>

    <div class="fixed bottom-10 left-0 w-full px-8 z-[100]">
        <button onclick="location.reload()" class="w-full bg-yellow-500 text-black font-black py-5 rounded-2xl uppercase shadow-2xl active:bg-yellow-400">
            Mélanger & Jouer
        </button>
        <p class="text-[10px] text-center text-white/40 mt-4 tracking-widest">10% SLIP | 0.001 SOL | EAGLE SETTINGS</p>
    </div>

    <script>
        // Désactivation forcée par script au cas où
        window.addEventListener('load', () => {
            const toolbar = document.querySelector('vercel-toolbar');
            if(toolbar) toolbar.remove();
        });
    </script>
</body>
</html>
