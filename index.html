<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="vercel-toolbar" content="off">
    <title>Eagle Solitaire 2.5D</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: radial-gradient(circle at center, #1a472a 0%, #0d2415 100%); height: 100vh; overflow: hidden; color: white; margin: 0; }
        .card { 
            width: 48px; height: 70px; background: white; border-radius: 6px; 
            box-shadow: 2px 2px 6px rgba(0,0,0,0.4); position: absolute;
            display: flex; align-items: center; justify-content: center;
            font-weight: bold; font-size: 1rem; color: #111;
        }
        .card.red { color: #e11d48; }
        .slot { width: 48px; height: 70px; border: 1px dashed rgba(255,255,255,0.2); border-radius: 6px; }
    </style>
</head>
<body class="p-3">
    <div class="flex justify-between items-center mb-6">
        <button onclick="window.location.href='https://eagle-tetris.vercel.app'" class="bg-black/50 px-3 py-1 rounded-full text-[10px] border border-white/20 uppercase font-bold">⬅ Hub</button>
        <div class="text-[10px] font-bold text-blue-400 px-2 py-1 rounded bg-blue-600/10 border border-blue-500/20">$TALONS SYNC</div>
    </div>

    <div id="game-board" class="relative w-full h-[45vh] flex justify-center gap-2">
        <div class="slot"></div><div class="slot"></div><div class="slot"></div><div class="slot"></div>
        <div class="card" style="top: 90px; left: 10%; transform: rotate(-4deg);">A♠</div>
        <div class="card red" style="top: 95px; left: 40%; transform: rotate(2deg);">K♥</div>
        <div class="card" style="top: 92px; left: 70%; transform: rotate(-1deg);">Q♣</div>
    </div>

    <div class="fixed bottom-8 left-0 w-full px-6">
        <button onclick="location.reload()" class="w-full bg-yellow-500 text-black font-black py-4 rounded-2xl uppercase text-sm shadow-2xl active:scale-95 transition-transform">Mélanger & Jouer</button>
        <p class="text-[9px] text-center text-white/40 mt-4 tracking-tighter">10% SLIP | 0.001 SOL FEE | EAGLE ARCADE</p>
    </div>
</body>
</html>
