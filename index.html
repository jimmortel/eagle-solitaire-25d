<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Eagle Solitaire</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #0d2415; height: 100vh; overflow: hidden; margin: 0; font-family: sans-serif; }
        .card { 
            width: 55px; height: 80px; background: white; border-radius: 8px; 
            position: absolute; display: flex; flex-direction: column; align-items: center; 
            justify-content: center; font-weight: bold; font-size: 1.2rem;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5); transition: all 0.3s ease;
            touch-action: none; border: 1px solid #ccc;
        }
        .slot { width: 55px; height: 80px; border: 2px dashed rgba(255,255,255,0.1); border-radius: 8px; }
    </style>
</head>
<body class="p-4">
    <div class="flex justify-between items-center mb-6">
        <button onclick="window.location.href='https://eagle-tetris.vercel.app'" class="bg-black text-white text-[10px] px-3 py-2 rounded-lg border border-white/20">⬅ HUB</button>
        <div class="text-blue-400 font-bold text-[10px] border border-blue-500/30 px-2 py-1 rounded bg-blue-900/20">$TALONS SYNC</div>
    </div>

    <div class="flex justify-center gap-2 mb-12">
        <div class="slot" id="s1"></div><div class="slot" id="s2"></div><div class="slot" id="s3"></div><div class="slot" id="s4"></div>
    </div>

    <div id="c1" class="card text-black" style="top:200px; left:15%;" onclick="moveCard('c1', 's1')">A♠</div>
    <div id="c2" class="card text-red-600" style="top:210px; left:42%;" onclick="moveCard('c2', 's2')">K♥</div>
    <div id="c3" class="card text-black" style="top:205px; left:70%;" onclick="moveCard('c3', 's3')">Q♣</div>

    <div class="fixed bottom-10 left-0 w-full px-6">
        <button onclick="location.reload()" class="w-full bg-yellow-500 text-black font-black py-4 rounded-2xl shadow-2xl">MÉLANGER</button>
        <p class="text-[9px] text-center text-white/30 mt-4 tracking-widest">10% SLIP | 0.001 SOL | EAGLE ARCADE</p>
    </div>

    <script>
        function moveCard(cardId, slotId) {
            const card = document.getElementById(cardId);
            const slot = document.getElementById(slotId);
            const rect = slot.getBoundingClientRect();
            
            // Animation vers le slot
            card.style.top = rect.top + "px";
            card.style.left = rect.left + "px";
            card.style.transform = "rotate(0deg) scale(1.05)";
            card.style.zIndex = "100";
        }
    </script>
</body>
</html>
